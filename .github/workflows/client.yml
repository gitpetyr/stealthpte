name: Client

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW linker
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build Windows exe
        working-directory: client
        run: |
          cargo build \
            --target x86_64-pc-windows-gnu \
            --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stealthclient-windows
          path: client/target/x86_64-pc-windows-gnu/release/stealthclient.exe

      - name: Create GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: client/target/x86_64-pc-windows-gnu/release/stealthclient.exe
