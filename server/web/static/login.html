<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StealthPTE · 登录</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#ffffff;border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:2rem;text-align:center;letter-spacing:-.5px}
  .logo{color:#0ea5e9;margin-right:.4rem}
  label{display:block;font-size:.8rem;color:#64748b;margin-bottom:.4rem}
  input{width:100%;padding:.65rem 1rem;background:#ffffff;border:1px solid #cbd5e1;border-radius:8px;color:#1e293b;font-size:.95rem;outline:none;transition:border-color .2s}
  input:focus{border-color:#0ea5e9}
  .field{margin-bottom:1.5rem}
  button{width:100%;padding:.75rem;background:#0ea5e9;border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
  button:hover{background:#0284c7}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#ef4444;font-size:.85rem;margin-top:1rem;text-align:center}
  .adv-toggle{font-size:.8rem;color:#94a3b8;cursor:pointer;text-align:center;margin-top:1.2rem;margin-bottom:0;user-select:none}
  .adv-toggle:hover{color:#64748b}
  .hint{font-size:.75rem;color:#94a3b8;margin-top:.35rem;line-height:1.4}
</style>
</head>
<body>
<div class="card" x-data="login()">
  <h1><span class="logo">⬡</span>StealthPTE</h1>
  <div class="field">
    <label>管理员密码</label>
    <input type="password" x-model="password" @keydown.enter="submit" placeholder="输入密码" :disabled="loading">
  </div>
  <button @click="submit" :disabled="loading" x-text="loading ? '登录中…' : '登录'"></button>
  <p class="err" x-show="error" x-text="error"></p>

  <p class="adv-toggle" @click="showAdv=!showAdv">
    <span x-text="showAdv ? '▲ 收起高级设置' : '▼ 高级设置'"></span>
  </p>
  <div x-show="showAdv" style="margin-top:1rem">
    <div class="field" style="margin-bottom:.5rem">
      <label>服务器公网地址</label>
      <input type="url" x-model="baseUrl" placeholder="https://your-domain.com"
             @change="saveBaseUrl" @blur="saveBaseUrl">
      <p class="hint">用于生成客户端安装命令。通过反向代理（如 code-server）访问时请修改为实际公网地址。</p>
    </div>
  </div>
</div>
<script>
function login() {
  return {
    password: '',
    loading: false,
    error: '',
    showAdv: true,
    baseUrl: location.protocol + '//' + location.host,
    async submit() {
      if (!this.password) return;
      this.loading = true; this.error = '';
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({password: this.password})
      });
      this.loading = false;
      if (res.ok) {
        const base = this.baseUrl.trim().replace(/\/$/, '');
        location.href = '/admin/?base=' + encodeURIComponent(base);
      } else { this.error = '密码错误'; this.password = ''; }
    }
  }
}
</script>
</body>
</html>
