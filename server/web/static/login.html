<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StealthPTE · 登录</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#1e293b;border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:2rem;text-align:center;letter-spacing:-.5px}
  .logo{color:#38bdf8;margin-right:.4rem}
  label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:.4rem}
  input{width:100%;padding:.65rem 1rem;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.95rem;outline:none;transition:border-color .2s}
  input:focus{border-color:#38bdf8}
  .field{margin-bottom:1.5rem}
  button{width:100%;padding:.75rem;background:#0ea5e9;border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
  button:hover{background:#0284c7}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#f87171;font-size:.85rem;margin-top:1rem;text-align:center}
</style>
</head>
<body>
<div class="card" x-data="login()">
  <h1><span class="logo">⬡</span>StealthPTE</h1>
  <div class="field">
    <label>管理员密码</label>
    <input type="password" x-model="password" @keydown.enter="submit" placeholder="输入密码" :disabled="loading">
  </div>
  <button @click="submit" :disabled="loading" x-text="loading ? '登录中…' : '登录'"></button>
  <p class="err" x-show="error" x-text="error"></p>
</div>
<script>
function login() {
  return {
    password: '',
    loading: false,
    error: '',
    async submit() {
      if (!this.password) return;
      this.loading = true; this.error = '';
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({password: this.password})
      });
      this.loading = false;
      if (res.ok) { location.href = '/admin/'; }
      else { this.error = '密码错误'; this.password = ''; }
    }
  }
}
</script>
</body>
</html>
